name: Android Build & Release CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Dispara quando uma tag v1.0, v2.1, etc. é criada

jobs:
  build:
    name: Build APK and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão para criar o GitHub Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: gradle assembleDebug
        env:
          # Injeta chaves nulas ou mockadas na compilação se necessário
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Rename APK for Release
        run: |
          mkdir -p build-release-apk
          cp app/build/outputs/apk/debug/app-debug.apk build-release-apk/devfolio-pro-latest.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: devfolio-pro-apk
          path: build-release-apk/devfolio-pro-latest.apk

      # Cria um release automático caso seja uma Tag ou se for push na Main
      - name: Create GitHub Release (Auto tag or main push)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          files: build-release-apk/devfolio-pro-latest.apk
          tag_name: ${{ github.ref_name || 'latest' }}
          name: Release ${{ github.ref_name || 'Latest Commit Build' }}
          body: |
            Nova funcionalidade ou atualização compilada automaticamente a partir do commit:
            - **Commit SHA**: `${{ github.sha }}`
            - **Mensagem**: `${{ github.event.head_commit.message }}`
            - **Autor**: `${{ github.actor }}`
            
            *Instale esta atualização em seu celular Android abrindo o app e usando o Verificador de Atualizações no menu de configurações!*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
